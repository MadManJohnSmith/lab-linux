networks:
  red_laboratorio:
    driver: bridge
  monitoring:
    driver: bridge

volumes:
  prometheus_data: {}
  grafana_data: {}
  server_backups: {}

services:
  server:
    build: ./server
    container_name: server
    hostname: server
    networks:
      - red_laboratorio
    ports:
      - "8080:8080"
    volumes:
      - server_backups:/var/backups
      - ./data/logs:/var/log/lab
      - ./data/backups:/var/backups_host
    environment:
      - TZ=America/Mexico_City

  client:
    build: ./client
    container_name: client
    hostname: client
    networks:
      - red_laboratorio
    depends_on:
      - server
    environment:
      - SERVER_HOST=server
      - SERVER_PORT=8080

  node-exporter:
    image: prom/node-exporter:v1.9.1
    container_name: node-exporter
    networks:
      - monitoring
    ports:
      - "9100:9100"
    command:
      - '--path.procfs=/host/proc'
      - '--path.rootfs=/rootfs'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    container_name: cadvisor
    networks:
      - monitoring
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    ports:
      - "8081:8080"
    privileged: true
    devices:
      - /dev/kmsg

  prometheus:
    image: prom/prometheus:v3.3.1
    container_name: prometheus
    networks:
      - monitoring
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus

  grafana:
    image: grafana/grafana:12.0.0
    container_name: grafana
    networks:
      - monitoring
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources
    depends_on:
      - prometheus
